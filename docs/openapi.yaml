openapi: 3.1.0
info:
  title: Block Beast Platform API
  version: 0.1.0
  description: |
    Block Beast 的 HTTP 接口。金额均以货币最小单位（minor unit）表示，例如 USDT 的 2500 表示由客户端与游戏规则共同约定的 2500 最小单位。

    除健康检查、平台信息和登录外的业务接口均需携带 `Authorization: Bearer <access_token>` 访问令牌；令牌通过 `POST /v1/auth/login` 获取，默认有效期 15 分钟。投注、钱包等账号级资源仅本人或具备 operator/admin 角色的账号可访问；轮次取消仅限 operator/admin。
  license:
    name: UNLICENSED
security: []
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: System
    description: 存活与依赖就绪检查。
  - name: Platform
    description: 平台元信息。
  - name: Auth
    description: 登录与访问令牌。
  - name: Rounds
    description: 游戏轮次查询与操作。
  - name: Bets
    description: 投注创建和查询。
  - name: Wallets
    description: 钱包余额查询。
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealth
      summary: API 存活检查
      responses:
        '200':
          description: API 正常运行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
  /readyz:
    get:
      tags: [System]
      operationId: getReadiness
      summary: PostgreSQL 就绪检查
      responses:
        '200':
          description: 依赖已就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/platform:
    get:
      tags: [Platform]
      operationId: getPlatform
      summary: 查询平台环境与领域列表
      responses:
        '200':
          description: 平台信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Platform'
  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: 注册玩家账号并签发访问令牌
      description: 在单个事务中创建用户、密码凭证、player 角色和默认 USDT 零余额钱包，注册完成即返回访问令牌。注册会写入审计日志。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login_name: player-001
              display_name: 玩家一号
              password: correct-horse-battery
      responses:
        '201':
          description: 注册成功，返回访问令牌。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: 密码登录并签发访问令牌
      description: 校验登录名与密码，为激活账号签发携带角色的短期 JWT。登录成功与失败均会写入审计日志。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login_name: player-001
              password: correct-horse-battery
      responses:
        '200':
          description: 登录成功，返回访问令牌。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/rounds:
    get:
      tags: [Rounds]
      operationId: listOpenRounds
      summary: 查询指定游戏的开放轮次
      security:
        - bearerAuth: []
      parameters:
        - name: game_type
          in: query
          required: true
          schema:
            type: string
          example: dice
        - name: limit
          in: query
          required: false
          description: 返回数量，默认 50，范围 1–100。
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: 开放轮次，按封盘时间升序。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Round'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/rounds/{roundID}:
    get:
      tags: [Rounds]
      operationId: getRound
      summary: 查询单个轮次
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoundID'
      responses:
        '200':
          description: 轮次详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Round'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/rounds/{roundID}/cancel:
    post:
      tags: [Rounds]
      operationId: cancelRound
      summary: 取消轮次并退款
      description: 仅开放或已封盘轮次可以取消。已接受的投注会退款；重复取消不会重复退款。仅限 operator/admin 角色调用，调用会写入审计日志。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoundID'
      responses:
        '200':
          description: 轮次已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cancellation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/bets:
    post:
      tags: [Bets]
      operationId: placeBet
      summary: 创建幂等投注
      description: 对同一 account_id 和 client_request_id 的重复请求会返回既有投注，不会再次扣款。仅本人或 operator/admin 可为指定账号投注。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBetRequest'
            example:
              client_request_id: web-20260720-0001
              round_id: 8374209d-069a-4e6a-b1f2-c166e3b5ee52
              account_id: 4fb2b612-88cf-47cf-8312-cd76fa4d8869
              currency: USDT
              selection:
                color: red
              stake_minor: 2500
      responses:
        '201':
          description: 投注已接受，或同一幂等键对应的既有投注。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/bets/{betID}:
    get:
      tags: [Bets]
      operationId: getBet
      summary: 查询投注记录
      description: 仅本人或 operator/admin 可查看对应账号的投注。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BetID'
      responses:
        '200':
          description: 投注详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/wallets/{accountID}:
    get:
      tags: [Wallets]
      operationId: getWalletBalance
      summary: 查询钱包余额
      description: 仅本人或 operator/admin 可查看对应账号的钱包。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - name: currency
          in: query
          required: true
          schema:
            type: string
          example: USDT
      responses:
        '200':
          description: 钱包余额
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RoundID:
      name: roundID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BetID:
      name: betID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountID:
      name: accountID
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: 请求参数或 JSON 请求体无效。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 缺少访问令牌，或令牌无效、已过期、凭证错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 已认证但角色不足、资源属于其他账号，或账号未激活。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 请求的资源不存在。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: 当前资源状态不允许该操作，或余额不足。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unavailable:
      description: 服务依赖尚未就绪或对应能力未启用。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Status:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [login_name, password]
      properties:
        login_name:
          type: string
          pattern: '^[A-Za-z0-9_-]{3,32}$'
          description: 3–32 位字母、数字、连字符或下划线。
        display_name:
          type: string
          description: 展示名，缺省与登录名相同。
        password:
          type: string
          minLength: 12
          format: password
    LoginRequest:
      type: object
      additionalProperties: false
      required: [login_name, password]
      properties:
        login_name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          format: password
    LoginResult:
      type: object
      required: [access_token, token_type, expires_in, user_id, roles]
      properties:
        access_token:
          type: string
          description: HS256 签发的 JWT 访问令牌。
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          format: int64
          description: 令牌有效期（秒）。
          example: 900
        user_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
            enum: [player, operator, admin]
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: round not found
    Platform:
      type: object
      required: [environment, domains]
      properties:
        environment:
          type: string
          example: development
        domains:
          type: array
          items:
            type: string
    Round:
      type: object
      required: [round_id, game_type, sequence, status, bet_closes_at]
      properties:
        round_id:
          type: string
          format: uuid
        game_type:
          type: string
          example: dice
        sequence:
          type: integer
          format: int64
        status:
          type: string
          enum: [open, closed, settling, settled, cancelled]
        bet_closes_at:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
        outcome:
          type: array
          items:
            type: string
    PlaceBetRequest:
      type: object
      additionalProperties: false
      required: [client_request_id, round_id, account_id, currency, selection, stake_minor]
      properties:
        client_request_id:
          type: string
          minLength: 1
          description: 客户端生成的幂等键；同一用户下必须唯一。
        round_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        currency:
          type: string
          minLength: 1
          example: USDT
        selection:
          description: 玩法定义的有效 JSON 选择值。
        stake_minor:
          type: integer
          format: int64
          minimum: 1
    Bet:
      type: object
      required: [bet_id, client_request_id, round_id, account_id, currency, selection, stake_minor, status, placed_at]
      properties:
        bet_id:
          type: string
          format: uuid
        client_request_id:
          type: string
        round_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        currency:
          type: string
        selection: {}
        stake_minor:
          type: integer
          format: int64
        status:
          type: string
          enum: [accepted, cancelled, lost, won, refunded]
        placed_at:
          type: string
          format: date-time
    WalletBalance:
      type: object
      required: [account_id, currency, available_minor, frozen_minor]
      properties:
        account_id:
          type: string
          format: uuid
        currency:
          type: string
        available_minor:
          type: integer
          format: int64
        frozen_minor:
          type: integer
          format: int64
    Cancellation:
      type: object
      required: [round_id, refunded_bet_count, status]
      properties:
        round_id:
          type: string
          format: uuid
        refunded_bet_count:
          type: integer
        status:
          type: string
          enum: [cancelled]
