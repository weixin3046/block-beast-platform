openapi: 3.1.0
info:
  title: Block Beast Platform API
  version: 0.1.0
  description: |
    Block Beast 的 HTTP 接口。金额均以货币最小单位（minor unit）表示，例如 USDT 的 2500 表示由客户端与游戏规则共同约定的 2500 最小单位。

    除健康检查、平台信息和登录外的业务接口均需携带 `Authorization: Bearer <access_token>` 访问令牌；令牌通过 `POST /v1/auth/login` 获取，默认有效期 15 分钟。投注、钱包等账号级资源仅本人或具备 operator/admin 角色的账号可访问；轮次取消仅限 operator/admin。
  license:
    name: UNLICENSED
security: []
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: System
    description: 存活与依赖就绪检查。
  - name: Platform
    description: 平台元信息。
  - name: Auth
    description: 登录与访问令牌。
  - name: Rounds
    description: 游戏轮次查询与操作。
  - name: Bets
    description: 投注创建和查询。
  - name: Wallets
    description: 钱包余额查询。
  - name: Chain
    description: 链上充值回调与提现。
  - name: Admin
    description: 管理后台操作（积分/USDT/体力充值）。
  - name: Stamina
    description: 体力消耗与流水。
  - name: Tasks
    description: 每日任务（签到）。
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealth
      summary: API 存活检查
      responses:
        '200':
          description: API 正常运行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
  /readyz:
    get:
      tags: [System]
      operationId: getReadiness
      summary: PostgreSQL 就绪检查
      responses:
        '200':
          description: 依赖已就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/platform:
    get:
      tags: [Platform]
      operationId: getPlatform
      summary: 查询平台环境与领域列表
      responses:
        '200':
          description: 平台信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Platform'
  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: 注册玩家账号并签发访问令牌
      description: 在单个事务中创建用户、密码凭证、player 角色和 USDT/POINTS/STAMINA 三种零余额钱包，注册完成即返回访问令牌。注册会写入审计日志。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login_name: player-001
              display_name: 玩家一号
              password: correct-horse-battery
      responses:
        '201':
          description: 注册成功，返回访问令牌。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: 密码登录并签发访问令牌
      description: 校验登录名与密码，为激活账号签发携带角色的短期 JWT。登录成功与失败均会写入审计日志。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login_name: player-001
              password: correct-horse-battery
      responses:
        '200':
          description: 登录成功，返回访问令牌。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/rounds:
    get:
      tags: [Rounds]
      operationId: listOpenRounds
      summary: 查询指定游戏的开放轮次
      security:
        - bearerAuth: []
      parameters:
        - name: game_type
          in: query
          required: true
          schema:
            type: string
          example: dice
        - name: limit
          in: query
          required: false
          description: 返回数量，默认 50，范围 1–100。
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: 开放轮次，按封盘时间升序。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Round'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/rounds/{roundID}:
    get:
      tags: [Rounds]
      operationId: getRound
      summary: 查询单个轮次
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoundID'
      responses:
        '200':
          description: 轮次详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Round'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/rounds/{roundID}/cancel:
    post:
      tags: [Rounds]
      operationId: cancelRound
      summary: 取消轮次并退款
      description: 仅开放或已封盘轮次可以取消。已接受的投注会退款；重复取消不会重复退款。仅限 operator/admin 角色调用，调用会写入审计日志。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoundID'
      responses:
        '200':
          description: 轮次已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cancellation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/bets:
    post:
      tags: [Bets]
      operationId: placeBet
      summary: 创建幂等投注
      description: 对同一 account_id 和 client_request_id 的重复请求会返回既有投注，不会再次扣款。仅本人或 operator/admin 可为指定账号投注。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBetRequest'
            example:
              client_request_id: web-20260720-0001
              round_id: 8374209d-069a-4e6a-b1f2-c166e3b5ee52
              account_id: 4fb2b612-88cf-47cf-8312-cd76fa4d8869
              currency: USDT
              selection:
                color: red
              stake_minor: 2500
      responses:
        '201':
          description: 投注已接受，或同一幂等键对应的既有投注。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/bets/{betID}:
    get:
      tags: [Bets]
      operationId: getBet
      summary: 查询投注记录
      description: 仅本人或 operator/admin 可查看对应账号的投注。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BetID'
      responses:
        '200':
          description: 投注详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/wallets/{accountID}:
    get:
      tags: [Wallets]
      operationId: getWalletBalance
      summary: 查询钱包余额
      description: 仅本人或 operator/admin 可查看对应账号的钱包。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - name: currency
          in: query
          required: true
          schema:
            type: string
          example: USDT
      responses:
        '200':
          description: 钱包余额
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/webhooks/chain/deposits:
    post:
      tags: [Chain]
      operationId: chainDepositWebhook
      summary: 链上充值回调（服务商调用）
      description: |
        PQPA 推送已确认充值。请求必须携带 HMAC 签名头：`X-Timestamp`（毫秒）、`X-Nonce`、`X-Signature`，并使用 `PQPA_API_SECRET` 验签。
        签名内容为 `方法\n路径\n时间戳\n随机数\n正文SHA256(十六进制)` 的 HMAC-SHA256（十六进制），密钥由平台分配；时间戳允许偏移默认 5 分钟。
        充值按服务商事件 ID 与交易哈希幂等，重复回调不会重复入账；非平台地址返回 `{"status":"ignored"}`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositWebhookRequest'
      responses:
        '200':
          description: 已处理（credited=true 表示本次入账；false 表示重复回调；ignored 表示非平台地址）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/webhooks/chain/withdrawals:
    post:
      tags: [Chain]
      operationId: chainWithdrawalWebhook
      summary: PQPA 提现状态回调
      description: 使用 `X-Timestamp`、`X-Nonce`、`X-Signature` 和 `PQPA_API_SECRET` 验签。`confirmed` 核销冻结余额，`failed` 自动解冻并恢复可用余额。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider_order_id, status]
              properties:
                provider_order_id: { type: string }
                status: { type: string, enum: [confirmed, failed] }
                tx_hash: { type: string }
                failure_reason: { type: string }
      responses:
        '200': { description: 已处理或已忽略 }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/deposit-addresses:
    get:
      tags: [Chain]
      operationId: getDepositAddress
      summary: 查询玩家充值地址
      security:
        - bearerAuth: []
      parameters:
        - name: chain_code
          in: query
          required: true
          schema: { type: string }
        - name: token_code
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: 充值地址 }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Chain]
      operationId: createDepositAddress
      summary: 创建玩家 PQPA 充值地址
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chain_code, token_code]
              properties:
                chain_code: { type: string, example: TRON }
                token_code: { type: string, example: USDT }
      responses:
        '201': { description: 已创建或返回既有充值地址 }
        '400': { $ref: '#/components/responses/BadRequest' }
        '502': { description: PQPA 服务不可用 }
  /v1/withdrawals:
    post:
      tags: [Chain]
      operationId: requestWithdrawal
      summary: 创建提现申请
      description: 从可用余额扣减并冻结申请金额，创建 requested 状态的提现申请。同一 client_request_id 重复请求返回既有申请，不重复冻结。身份取自访问令牌。申请会写入审计日志。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalRequest'
      responses:
        '201':
          description: 提现申请已创建（或幂等键对应的既有申请）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Withdrawal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/withdrawals/{withdrawalID}:
    get:
      tags: [Chain]
      operationId: getWithdrawal
      summary: 查询提现申请
      description: 仅本人或 operator/admin 可查看。
      security:
        - bearerAuth: []
      parameters:
        - name: withdrawalID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 提现申请详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Withdrawal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/admin/credits:
    post:
      tags: [Admin]
      operationId: adminCredit
      summary: 管理员手动充值（积分/USDT/体力）
      description: |
        为指定用户充值积分、USDT 或体力。按 request_id 幂等，重复请求返回首次结果不重复入账。
        积分流水写入 points_ledger，体力流水写入 stamina_ledger，USDT 流水写入 ledger_entries；
        用户尚无该币种钱包时随充值创建。仅限 operator/admin 角色，调用写入审计日志。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreditRequest'
            example:
              user_id: 4fb2b612-88cf-47cf-8312-cd76fa4d8869
              currency: POINTS
              amount_minor: 10000
              remark: 活动补偿
              request_id: admin-20260723-0001
      responses:
        '200':
          description: 充值结果（credited=false 表示重复请求未重复入账）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/stamina/consume:
    post:
      tags: [Stamina]
      operationId: consumeStamina
      summary: 参加活动消耗体力
      description: 按 (user_id, activity_id) 幂等扣减体力，重复请求不重复扣减。仅本人或 operator/admin 可调用。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumeStaminaRequest'
            example:
              user_id: 4fb2b612-88cf-47cf-8312-cd76fa4d8869
              amount_minor: 10
              activity_id: lucky-draw-20260723
              remark: 参与抽奖活动
      responses:
        '200':
          description: 消耗结果（consumed=false 表示重复请求未重复扣减）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumeResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/tasks/checkin:
    post:
      tags: [Tasks]
      operationId: checkin
      summary: 每日签到领取体力
      description: 按用户与日期幂等，当日重复签到返回首次记录不重复发放。奖励体力值由服务端配置。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 签到结果（checked_in=false 表示今日已签到）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckinResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/wallets/{accountID}/all:
    get:
      tags: [Wallets]
      operationId: getAllBalances
      summary: 查询账号全部币种余额
      description: 返回 USDT/POINTS/STAMINA 等所有钱包余额，仅本人或 operator/admin 可查。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: 全部币种余额列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WalletBalance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/points/{accountID}/ledger:
    get:
      tags: [Wallets]
      operationId: listPointsLedger
      summary: 查询积分流水
      description: 按时间倒序返回积分变动流水（管理员上分、任务奖励等），仅本人或 operator/admin 可查。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: 积分流水列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/Unavailable'
  /v1/stamina/{accountID}/ledger:
    get:
      tags: [Stamina]
      operationId: listStaminaLedger
      summary: 查询体力流水
      description: 按时间倒序返回体力变动流水（管理员充值、签到奖励、投注任务奖励、活动消耗），仅本人或 operator/admin 可查。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountID'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: 体力流水列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/Unavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RoundID:
      name: roundID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BetID:
      name: betID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountID:
      name: accountID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: 返回数量，默认 50，范围 1–100。
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      description: 分页偏移，默认 0。
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: 请求参数或 JSON 请求体无效。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 缺少访问令牌，或令牌无效、已过期、凭证错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 已认证但角色不足、资源属于其他账号，或账号未激活。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 请求的资源不存在。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: 当前资源状态不允许该操作，或余额不足。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unavailable:
      description: 服务依赖尚未就绪或对应能力未启用。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Status:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    DepositWebhookRequest:
      type: object
      required: [provider_event_id, tx_hash, chain_code, token_code, address, amount_minor]
      properties:
        provider_event_id:
          type: string
          description: 服务商事件唯一 ID，用于幂等。
        tx_hash:
          type: string
        chain_code:
          type: string
          example: TRON
        token_code:
          type: string
          example: USDT
        address:
          type: string
          description: 平台分配给用户的充值地址。
        amount_minor:
          type: integer
          format: int64
          minimum: 1
    DepositResult:
      type: object
      required: [deposit_id, status, credited]
      properties:
        deposit_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [credited]
        credited:
          type: boolean
          description: false 表示重复回调，未重复入账。
    WithdrawalRequest:
      type: object
      additionalProperties: false
      required: [client_request_id, destination_address, currency, amount_minor]
      properties:
        client_request_id:
          type: string
          minLength: 1
          description: 客户端生成的幂等键；同一用户下必须唯一。
        destination_address:
          type: string
          minLength: 1
        currency:
          type: string
          example: USDT
        amount_minor:
          type: integer
          format: int64
          minimum: 1
    Withdrawal:
      type: object
      required: [withdrawal_id, client_request_id, destination_address, currency, amount_minor, status, created_at]
      properties:
        withdrawal_id:
          type: string
          format: uuid
        client_request_id:
          type: string
        destination_address:
          type: string
        currency:
          type: string
        amount_minor:
          type: integer
          format: int64
        status:
          type: string
          enum: [requested, approved, broadcasted, confirmed, failed, cancelled]
        created_at:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [login_name, password]
      properties:
        login_name:
          type: string
          pattern: '^[A-Za-z0-9_-]{3,32}$'
          description: 3–32 位字母、数字、连字符或下划线。
        display_name:
          type: string
          description: 展示名，缺省与登录名相同。
        password:
          type: string
          minLength: 12
          format: password
    LoginRequest:
      type: object
      additionalProperties: false
      required: [login_name, password]
      properties:
        login_name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          format: password
    LoginResult:
      type: object
      required: [access_token, token_type, expires_in, user_id, roles]
      properties:
        access_token:
          type: string
          description: HS256 签发的 JWT 访问令牌。
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          format: int64
          description: 令牌有效期（秒）。
          example: 900
        user_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
            enum: [player, operator, admin]
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: round not found
    Platform:
      type: object
      required: [environment, domains]
      properties:
        environment:
          type: string
          example: development
        domains:
          type: array
          items:
            type: string
    Round:
      type: object
      required: [round_id, game_type, sequence, status, bet_closes_at]
      properties:
        round_id:
          type: string
          format: uuid
        game_type:
          type: string
          example: dice
        sequence:
          type: integer
          format: int64
        status:
          type: string
          enum: [open, closed, settling, settled, cancelled]
        bet_closes_at:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
        outcome:
          type: array
          items:
            type: string
    PlaceBetRequest:
      type: object
      additionalProperties: false
      required: [client_request_id, round_id, account_id, currency, selection, stake_minor]
      properties:
        client_request_id:
          type: string
          minLength: 1
          description: 客户端生成的幂等键；同一用户下必须唯一。
        round_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        currency:
          type: string
          minLength: 1
          example: USDT
        selection:
          description: 玩法定义的有效 JSON 选择值。
        stake_minor:
          type: integer
          format: int64
          minimum: 1
    Bet:
      type: object
      required: [bet_id, client_request_id, round_id, account_id, currency, selection, stake_minor, status, placed_at]
      properties:
        bet_id:
          type: string
          format: uuid
        client_request_id:
          type: string
        round_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        currency:
          type: string
        selection: {}
        stake_minor:
          type: integer
          format: int64
        status:
          type: string
          enum: [accepted, cancelled, lost, won, refunded]
        placed_at:
          type: string
          format: date-time
    WalletBalance:
      type: object
      required: [account_id, currency, available_minor, frozen_minor]
      properties:
        account_id:
          type: string
          format: uuid
        currency:
          type: string
        available_minor:
          type: integer
          format: int64
        frozen_minor:
          type: integer
          format: int64
    Cancellation:
      type: object
      required: [round_id, refunded_bet_count, status]
      properties:
        round_id:
          type: string
          format: uuid
        refunded_bet_count:
          type: integer
        status:
          type: string
          enum: [cancelled]
    AdminCreditRequest:
      type: object
      additionalProperties: false
      required: [user_id, currency, amount_minor, request_id]
      properties:
        user_id:
          type: string
          format: uuid
          description: 目标用户 ID。
        currency:
          type: string
          enum: [POINTS, USDT, STAMINA]
          description: 充值币种。
        amount_minor:
          type: integer
          format: int64
          minimum: 1
        remark:
          type: string
          description: 备注，写入流水。
        request_id:
          type: string
          minLength: 1
          description: 幂等键；同一 request_id 不重复入账。
    CreditResult:
      type: object
      required: [user_id, currency, amount_minor, balance_after_minor, credited, occurred_at]
      properties:
        user_id:
          type: string
          format: uuid
        currency:
          type: string
        amount_minor:
          type: integer
          format: int64
        balance_after_minor:
          type: integer
          format: int64
        credited:
          type: boolean
          description: false 表示重复请求，未重复入账。
        occurred_at:
          type: string
          format: date-time
    ConsumeStaminaRequest:
      type: object
      additionalProperties: false
      required: [user_id, amount_minor, activity_id]
      properties:
        user_id:
          type: string
          format: uuid
        amount_minor:
          type: integer
          format: int64
          minimum: 1
        activity_id:
          type: string
          minLength: 1
          description: 活动标识；同一用户同一活动不重复扣减。
        remark:
          type: string
    ConsumeResult:
      type: object
      required: [user_id, amount_minor, balance_after_minor, consumed, occurred_at]
      properties:
        user_id:
          type: string
          format: uuid
        amount_minor:
          type: integer
          format: int64
        balance_after_minor:
          type: integer
          format: int64
        consumed:
          type: boolean
          description: false 表示重复请求，未重复扣减。
        occurred_at:
          type: string
          format: date-time
    CheckinResult:
      type: object
      required: [user_id, checkin_date, reward_minor, balance_after_minor, checked_in, occurred_at]
      properties:
        user_id:
          type: string
          format: uuid
        checkin_date:
          type: string
          format: date
        reward_minor:
          type: integer
          format: int64
          description: 本次签到发放的体力值。
        balance_after_minor:
          type: integer
          format: int64
        checked_in:
          type: boolean
          description: false 表示今日已签到。
        occurred_at:
          type: string
          format: date-time
    LedgerEntry:
      type: object
      required: [id, user_id, business_type, business_id, amount_minor, balance_after_minor, remark, occurred_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        business_type:
          type: string
          description: 业务类型，如 admin_credit / checkin_reward / bet_task_reward / activity_consume。
        business_id:
          type: string
        amount_minor:
          type: integer
          format: int64
          description: 正数为入账，负数为出账。
        balance_after_minor:
          type: integer
          format: int64
        remark:
          type: string
        operator_id:
          type: string
          description: 操作人 ID（管理员操作时存在）。
        occurred_at:
          type: string
          format: date-time
