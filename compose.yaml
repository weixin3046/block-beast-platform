services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blockbeast
      POSTGRES_USER: blockbeast
      POSTGRES_PASSWORD: blockbeast
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/0001_core.sql:/docker-entrypoint-initdb.d/0001_core.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockbeast -d blockbeast"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  api:
    build: .
    command: ["/app/api"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build: .
    command: ["/app/worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  realtime:
    build: .
    command: ["/app/realtime"]
    env_file: .env
    ports:
      - "8081:8081"

volumes:
  postgres-data: